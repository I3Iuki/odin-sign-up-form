<!DOCTYPE html>
<html lang="en">
  <head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Odin Sign Up Form</title>
    
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="hero" >
      <div id="header">
        <img src="./img/logo.png" alt="Odin Project logo" id="logo">
        <h1 id="title">ODIN</h1>
      </div>    
      <p id="footer">Photo by <u>Halie West</u> on <u>Unsplash</u></p>
    </div>
    <div id="form-section">
      <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <i>now</i> to get started.</p>
      <p>You <i>know</i> you want to.</p>
      <form action="" id="form">
        <h2>Let's do this!</h2>

        <div id="inputs-wrapper">
          <div>
            <label for="first-name">FIRST NAME</label>
            <input type="text" id="first-name" name="fname" required>
          </div>
          
          <div>
            <label for="last-name">LAST NAME</label>
            <input type="text" id="last-name" name="fname" required>
          </div>
          
          <div>
            <label for="email">EMAIL</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div>
            <label for="phone">PHONE NUMBER</label>
            <input type="tel" id="phone" name="phone" required>
          </div>
          <div>
            <label for="password">PASSWORD</label>
            <input type="password" id="password" name="password" required>
          </div>
          
          <div>
            <label for="password-confirmation">CONFIRM PASSWORD</label>
            <input type="password-confirmation" id="password-confirmation" name="password-confirmation" required>
          </div>
          <button type="submit" id="submit">Create Account</button>
        </div>

      </form>
      <p id="log-in-text">Already have an account? <a href="#" id="log-in-link">Log in</a></p>
    </div>
  </body>
</html>
